name: Refresh TCGdex Card Index

on:
  schedule:
    # Runs at 09:00 UTC on the 1st of every month
    - cron: "0 9 1 * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab too

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Adjust this if the script lives in a subfolder of your repo
    defaults:
      run:
        working-directory: ./scripts/tcgdex-cache

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run refresh script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node refresh-tcgdex-index.js
